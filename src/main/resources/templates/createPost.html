<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Create Post</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
  <h1>Create Post</h1>

  <form th:action="@{/posts}" th:object="${post}" method="post">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" th:field="*{title}" placeholder="Enter title">
    </div>

    <div class="form-group">
      <label for="content">Content</label>
      <textarea id="content" th:field="*{content}" placeholder="Enter content"></textarea>
    </div>

    <button type="submit">Post</button>
    <a class="btn" th:href="@{/}">Back</a>
  </form>
</div>
</body>
</html>
