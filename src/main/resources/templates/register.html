<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/static/style.css}">
</head>
<body>

<h1>Register</h1>

<p th:if="${error}"
   th:text="${error}">
</p>

<form th:action="@{/register}"
      th:object="${user}"
      method="post">

    <div>
        <label>Username</label>
        <input type="text"
               th:field="*{username}">
    </div>

    <div>
        <label>Password</label>
        <input type="password"
               th:field="*{password}">
    </div>

    <button type="submit">
        Register
    </button>

</form>

<a href="/login">Login</a>

</body>
</html>
